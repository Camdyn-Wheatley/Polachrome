# ──────────────────────────────────────────────────────────────────────────────
# Combat Robot Controller — Configuration
# ──────────────────────────────────────────────────────────────────────────────

# ── Kinect V2 ────────────────────────────────────────────────────────────────
kinect_pipeline: "opengl"        # Processing backend: opengl, opencl, cpu

# ── ArUco Detection ──────────────────────────────────────────────────────────
aruco_dict: "DICT_4X4_50"         # 4x4 ArUco — matches physically printed tags
robot_tag_top: 17                # ArUco ID on top of robot    (update to match your tags)
robot_tag_bottom: 37             # ArUco ID on bottom of robot (update to match your tags)
detect_on_ir: false              # Use color stream for tag detection (false = color, true = IR)

# ── Kalman filter ────────────────────────────────────────────────────────────
max_coast_frames: 30

# ── Logging ──────────────────────────────────────────────────────────────────
position_log: "positions.csv"

# ── Arena bounds (pixel coordinates — will need recalibration for Kinect) ────
arena_tl: [50, 50]
arena_br: [462, 374]
robot_offset: 20                 # px — safety inset

# ── Path planner (placeholder — will be rewritten) ──────────────────────────
path_replan_dist: 20             # px — replan when robot moves this much
lookahead_dist: 80               # px — pure-pursuit lookahead
approach_standoff: 80            # px — lineup distance behind opponent

# ── Motion control (PWM microseconds) ───────────────────────────────────────
pwm_min: 1000
pwm_max: 2000
pwm_neutral: 1486
max_drive_speed: 400             # µs offset from neutral
max_turn_speed: 400              # µs offset from neutral
weapon_on_value: 2000
weapon_off_value: 1000

# ── Arduino serial ───────────────────────────────────────────────────────────
arduino_port: null               # null for auto-detect
arduino_baud: 9600
arduino_step: 5                  # PWM µs per character command

# ── Channel reversal ────────────────────────────────────────────────────────
channel_reverse_steer: false
channel_reverse_drive: true      # robot drives backwards by default
channel_reverse_weapon: false
