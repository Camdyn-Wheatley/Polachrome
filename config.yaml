# ──────────────────────────────────────────────────────────────────────────────
# Combat Robot Controller — Configuration
# ──────────────────────────────────────────────────────────────────────────────

# ── Kinect V2 ────────────────────────────────────────────────────────────────
kinect_pipeline: "opengl"        # Processing backend: opengl, opencl, cpu

# ── Depth Segmentation ───────────────────────────────────────────────────────
arena_max_depth_mm: 3500         # Maximum depth to consider (ignores walls beyond this)
obstacle_min_height_mm: 12.0     # Minimum height above ground to be considered an obstacle
obstacle_min_area_px: 25         # Minimum pixel area to filter out noise
obstacle_max_area_px: 5000       # Maximum pixel area to filter out massive objects (0 to disable)

# ── ArUco Detection ──────────────────────────────────────────────────────────
aruco_dict: "DICT_APRILTAG_25H9"   # AprilTag 25h9 — matches robot's existing tags
robot_tag_top: 0                 # AprilTag ID on top of robot
robot_tag_bottom: 1              # AprilTag ID on bottom of robot
arena_floor_tag: 3               # AprilTag ID to use for ground plane calibration
detect_on_ir: false              # Use color stream for tag detection (false = color, true = IR)
flip_horizontal: true            # Mirror all frames horizontally (Kinect mounted inverted)

# ── Kalman filter ────────────────────────────────────────────────────────────
max_coast_frames: 30

# ── Logging ──────────────────────────────────────────────────────────────────
position_log: "positions.csv"

# ── Arena bounds (pixel coordinates — will need recalibration for Kinect) ────
arena_tl: [50, 50]
arena_br: [462, 374]
robot_offset: 20                 # px — safety inset

# ── Path planner (placeholder — will be rewritten) ──────────────────────────
path_replan_dist: 20             # px — replan when robot moves this much
lookahead_dist: 80               # px — pure-pursuit lookahead
approach_standoff: 80            # px — lineup distance behind opponent

# ── Motion control (PWM microseconds) ───────────────────────────────────────
pwm_min: 1000
pwm_max: 2000
pwm_neutral: 1486
max_drive_speed: 400             # µs offset from neutral
max_turn_speed: 400              # µs offset from neutral
weapon_on_value: 2000
weapon_off_value: 1000

# ── Arduino serial ───────────────────────────────────────────────────────────
arduino_port: null               # null for auto-detect
arduino_baud: 9600

# ── Channel reversal ────────────────────────────────────────────────────────
channel_reverse_steer: false
channel_reverse_drive: true      # robot drives backwards by default
channel_reverse_weapon: false
